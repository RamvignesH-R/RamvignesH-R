name: Update Recent Repos in Profile README

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */12 * * *"

  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  update-recent-repos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Update repositories section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}

        run: |
          python <<EOF
          import os
          import re
          import requests

          user = os.getenv("GITHUB_USER")
          token = os.getenv("GITHUB_TOKEN")

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json"
          }

          response = requests.get(
              f"https://api.github.com/users/{user}/repos?sort=updated&per_page=10",
              headers=headers
          )

          repos = response.json()

          cards = []

          count = 0

          for repo in repos:

              if repo.get("fork"):
                  continue

              name = repo["name"]

              card = f"""
<a href="https://github.com/{user}/{name}">
<img height="170" src="https://github-readme-stats.vercel.app/api/pin/?username={user}&repo={name}&theme=tokyonight&hide_border=true"/>
</a>
"""

              cards.append(card)

              count += 1

              if count >= 3:
                  break

          new_block = f"""
<div align="center">

{''.join(cards)}

</div>
"""

          with open("README.md", "r", encoding="utf-8") as file:
              content = file.read()

          pattern = r"(<!--START_SECTION:recent_repos-->)(.*?)(<!--END_SECTION:recent_repos-->)"

          updated = re.sub(
              pattern,
              r"\\1\n" + new_block + r"\n\\3",
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w", encoding="utf-8") as file:
              file.write(updated)

          print("README updated successfully")

          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --cached --quiet || git commit -m "chore: update recent repos"

          git push
