name: Update Recent Repos in Profile README

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  update-recent-repos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update recent repos section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
          MAX_REPOS: "3"
          EXCLUDE_FORKS: "true"
          EXCLUDE_ARCHIVED: "true"

        run: |
          python <<'EOF'
          import os
          import re
          import requests
          import sys

          token = os.getenv("GITHUB_TOKEN")
          user = os.getenv("GITHUB_USER")

          max_repos = int(os.getenv("MAX_REPOS", "3"))
          exclude_forks = os.getenv("EXCLUDE_FORKS", "true").lower() == "true"
          exclude_archived = os.getenv("EXCLUDE_ARCHIVED", "true").lower() == "true"

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          url = f"https://api.github.com/users/{user}/repos?per_page=100&sort=updated"

          response = requests.get(url, headers=headers, timeout=30)

          if response.status_code != 200:
              print("Failed to fetch repos")
              print(response.text)
              sys.exit(1)

          repos = response.json()

          filtered = []

          for repo in repos:

              if exclude_forks and repo.get("fork"):
                  continue

              if exclude_archived and repo.get("archived"):
                  continue

              filtered.append(repo)

          filtered.sort(
              key=lambda r: r.get("pushed_at") or r.get("updated_at") or "",
              reverse=True
          )

          top_repos = filtered[:max_repos]

          cards = []
          blurbs = []

          for repo in top_repos:

              name = repo["name"]

              desc = (
                  repo.get("description")
                  or "No description available."
              ).strip()

              language = repo.get("language") or "Unknown"

              stars = repo.get("stargazers_count", 0)

              card = f"""
              <a href="https://github.com/{user}/{name}" target="_blank">
                <img
                  src="https://github-readme-stats.vercel.app/api/pin/?username={user}&repo={name}&theme=tokyonight&hide_border=true&border_radius=15&show_icons=true&cache_seconds=86400"
                  alt="{name} repo card"
                />
              </a>
              """

              cards.append(card)

              blurbs.append(
                  f'''
                  <sub>
                  • <b>{name}</b> ({language}) ⭐ {stars}<br>
                  {desc}
                  </sub><br><br>
                  '''
              )

          if not cards:
              new_block = "*No recent public repository activity.*"

          else:

              new_block = (
                  '<div align="center">\n'
                  + "\n".join(cards)
                  + '\n</div>\n\n'
                  + '<p align="center">\n'
                  + "\n".join(blurbs)
                  + '\n</p>'
              )

          readme_path = "README.md"

          try:
              with open(readme_path, "r", encoding="utf-8") as file:
                  content = file.read()

          except FileNotFoundError:
              print("README.md not found.")
              sys.exit(1)

          pattern = r"(<!--START_SECTION:recent_repos-->)(.*?)(<!--END_SECTION:recent_repos-->)"

          new_content, replaced = re.subn(
              pattern,
              r"\1\n" + new_block + r"\n\3",
              content,
              flags=re.DOTALL,
          )

          if replaced == 0:
              print("README markers not found.")
              sys.exit(1)

          if new_content == content:
              print("No README changes detected.")
              sys.exit(0)

          with open(readme_path, "w", encoding="utf-8") as file:
              file.write(new_content)

          print("README updated successfully.")

          EOF

      - name: Commit and push changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add README.md

            git commit -m "chore: update recent repos"

            git push

          else
            echo "No changes to commit."
          fi